<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Hello Phoebe!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, 
                #ff6b6b 0%, #ff8e53 20%, #f9d423 40%, 
                #a8e063 60%, #4facfe 80%, #9d4edd 100%
            );
            background-size: 300% 300%;
            animation: gradientShift 18s ease infinite;
            font-family: system-ui, -apple-system, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 12vh;
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            padding: 3.5rem 3rem;
            background: rgba(255, 255, 255, 0.14);
            border-radius: 24px;
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 14px 50px rgba(0, 0, 0, 0.35);
            margin-top: -8vh;
            max-width: 90%;
        }

        h1 {
            font-size: 5.5rem;
            font-weight: 900;
            letter-spacing: -3px;
            margin-bottom: 1.4rem;
            background: linear-gradient(90deg, #ffffff, #ffe066, #a5d8ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 6px 22px rgba(0, 0, 0, 0.4);
        }

        .intro {
            font-size: 1.8rem;
            margin: 1.2rem 0 2.5rem;
            opacity: 0.95;
            letter-spacing: 0.7px;
        }

        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(90deg, #ff3366, #ff6b6b, #ff8e53);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(255, 51, 102, 0.4);
            margin-top: 1rem;
        }

        .btn:hover {
            transform: translateY(-4px) scale(1.08);
            box-shadow: 0 14px 40px rgba(255, 51, 102, 0.6);
            background: linear-gradient(90deg, #ff4d4d, #ff8c66, #ffb366);
        }

        .btn:active {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello World!</h1>
        <p class="intro">I'm Phoebe Lee 🌸<br>Welcome to my colorful corner of the internet!</p>
        
        <a 
            href="https://www.youtube.com/watch?v=x6-2ER1IVzo" 
            target="_blank" 
            rel="noopener noreferrer"
            class="btn"
        >
            Play My Favorite Song 🎵
        </a>
    </div>
</body>
</html>

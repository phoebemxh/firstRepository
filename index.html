<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Hello Phoebe!</title>

    <!-- cdn, no installation required-->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Light mode (default) colors */
            --bg-gradient: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 20%, #f9d423 40%, #a8e063 60%, #4facfe 80%, #9d4edd 100%);
            --text-color: white;
            --container-bg: rgba(255, 255, 255, 0.14);
            --container-border: rgba(255, 255, 255, 0.3);
            --shadow-color: rgba(0, 0, 0, 0.35);
            --btn-gradient: linear-gradient(90deg, #ff3366, #ff6b6b, #ff8e53);
            --btn-hover-gradient: linear-gradient(90deg, #ff4d4d, #ff8c66, #ffb366);
            --btn-shadow: rgba(255, 51, 102, 0.4);
            --btn-hover-shadow: rgba(255, 51, 102, 0.6);
        }

        body.dark {
            /* Dark mode colors */
            --bg-gradient: linear-gradient(135deg, #2c0b3c 0%, #4a148c 20%, #7b1fa2 40%, #ab47bc 60%, #d81b60 80%, #f06292 100%);
            --text-color: #f0e6ff;
            --container-bg: rgba(30, 10, 50, 0.5);
            --container-border: rgba(200, 150, 255, 0.25);
            --shadow-color: rgba(0, 0, 0, 0.6);
            --btn-gradient: linear-gradient(90deg, #9c27b0, #d81b60, #ff4081);
            --btn-hover-gradient: linear-gradient(90deg, #ab47bc, #ec407a, #ff80ab);
            --btn-shadow: rgba(156, 39, 176, 0.5);
            --btn-hover-shadow: rgba(156, 39, 176, 0.7);
        }

        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            background-size: 300% 300%;
            animation: gradientShift 18s ease infinite;
            font-family: system-ui, -apple-system, sans-serif;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 12vh;
            /*transition: background 0.5s ease;   deleted*/
            /*overflow: hidden;*/           /* for floating elements */
            position: relative;
        }

        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;       /* So they don't block clicks */
            z-index: 1;                 /* Under container, above background */
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            animation: float 15s infinite linear;
            box-shadow: 0 0 25px rgba(255,255,255,0.3);
        }

        .music-note {
            position: absolute;
            font-size: 2.2rem;
            opacity: 0.25;
            animation: floatNote 18s infinite linear;
            user-select: none;
        }

        @keyframes float {
            0%   { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-100px) rotate(360deg); }
        }

        @keyframes floatNote {
            0%   { transform: translateY(100vh) rotate(-20deg); }
            100% { transform: translateY(-100px) rotate(20deg); }
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            z-index: 2;                    /* Higher than floating elements */
            position: relative;            /* Important */
            text-align: center;
            padding: 3.5rem 3rem;
            background: var(--container-bg);
            border-radius: 24px;
            backdrop-filter: blur(14px);
            border: 1px solid var(--container-border);
            box-shadow: 0 14px 50px var(--shadow-color);
            margin-top: -8vh;
            max-width: 90%;
            transition: all 0.4s ease;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 5.5rem;
            font-weight: 900;
            letter-spacing: -3px;
            margin-bottom: 1.4rem;
            background: linear-gradient(90deg, #ffffff, #ffe066, #a5d8ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 6px 22px rgba(0, 0, 0, 0.4);
        }

        .intro {
            font-size: 1.8rem;
            margin: 1.2rem 0 2.5rem;
            opacity: 0.95;
            letter-spacing: 0.7px;
        }

        .about-section {
            margin-top: 2rem;
            padding: 2rem;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            text-align: left;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background: var(--btn-gradient);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px var(--btn-shadow);
            margin-top: 1rem;
        }

        .btn:hover {
            transform: translateY(-4px) scale(1.08);
            box-shadow: 0 14px 40px var(--btn-hover-shadow);
            background: var(--btn-hover-gradient);
        }

        .btn:active {
            transform: translateY(-1px); /*active state disappear when release mouse*/
        }

        #theme-toggle {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 1.6rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            z-index: 100;
        }

        #theme-toggle:hover {
            transform: scale(1.15);
            background: rgba(255,255,255,0.35);
        }
    </style>
</head>
<body>

    <div id="app">
        
        <button 
            id="theme-toggle" 
            @click="toggleTheme"
            aria-label="Toggle dark mode">
            {{ isDark ? '☀️' : '🌙' }}
        </button>

        <div class="floating-elements">
            <!-- Floating Orbs -->
            <div class="orb" style="width:80px; height:80px; left:10%; animation-duration: 22s;"></div>
            <div class="orb" style="width:120px; height:120px; left:25%; animation-duration: 28s; animation-delay: -8s;"></div>
            <div class="orb" style="width:60px; height:60px; left:70%; animation-duration: 19s; animation-delay: -5s;"></div>
            <div class="orb" style="width:90px; height:90px; left:85%; animation-duration: 25s; animation-delay: -12s;"></div>

            <!-- Floating Music Notes -->
            <div class="music-note" style="left:15%; animation-delay: 0s;">♪</div>
            <div class="music-note" style="left:35%; animation-delay: 4s;">♫</div>
            <div class="music-note" style="left:55%; animation-delay: 9s;">♬</div>
            <div class="music-note" style="left:75%; animation-delay: 2s;">♪</div>
        </div>

        <div class="container">
            <h1>Hello World!</h1>
            <p class="intro">I'm Phoebe Lee 🌸<br>Welcome to my webpage</p>
            
            <button @click="showAbout = !showAbout" class="btn">
                {{ showAbout ? 'Hide About Me' : 'Learn About Me' }}
            </button>
            <div v-if="showAbout" class="about-section">
                <h2>About Me 🌟</h2>
                <p>music is my daily fuel</p>
            </div>
            <button @click="playSong" class="btn">
                Play My Favorite Song 🎵
            </button>

            <p style="margin-top: 2rem; font-size: 1.3rem; opacity: 0.9;">
                Play button clicked <strong>{{ clickCount }}</strong> times ✨
            </p>
        </div>

    </div>
    
    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    isDark: false,
                    showAbout: false,
                    clickCount: 0,
                    songUrl: "https://www.youtube.com/watch?v=x6-2ER1IVzo"
                }
            },
            mounted() {
                // Check saved theme
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'dark' || 
                    (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    this.isDark = true;
                    document.body.classList.add('dark');
                }
            },
            methods: {
                toggleTheme() {
                    this.isDark = !this.isDark;
                    
                    if (this.isDark) {
                        document.body.classList.add('dark');
                        localStorage.setItem('theme', 'dark');
                    } else {
                        document.body.classList.remove('dark');
                        localStorage.setItem('theme', 'light');
                    }
                },
                playSong() {
                    this.clickCount++;
                    window.open(this.songUrl, "_blank");
                }
            }
        }).mount('#app');
    </script>

</body>
</html>

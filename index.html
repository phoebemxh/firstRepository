<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Hello Phoebe!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Light mode (default) colors */
            --bg-gradient: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 20%, #f9d423 40%, #a8e063 60%, #4facfe 80%, #9d4edd 100%);
            --text-color: white;
            --container-bg: rgba(255, 255, 255, 0.14);
            --container-border: rgba(255, 255, 255, 0.3);
            --shadow-color: rgba(0, 0, 0, 0.35);
            --btn-gradient: linear-gradient(90deg, #ff3366, #ff6b6b, #ff8e53);
            --btn-hover-gradient: linear-gradient(90deg, #ff4d4d, #ff8c66, #ffb366);
            --btn-shadow: rgba(255, 51, 102, 0.4);
            --btn-hover-shadow: rgba(255, 51, 102, 0.6);
        }

        body.dark {
            /* Dark mode colors */
            --bg-gradient: linear-gradient(135deg, #2c0b3c 0%, #4a148c 20%, #7b1fa2 40%, #ab47bc 60%, #d81b60 80%, #f06292 100%);
            --text-color: #f0e6ff;
            --container-bg: rgba(30, 10, 50, 0.5);
            --container-border: rgba(200, 150, 255, 0.25);
            --shadow-color: rgba(0, 0, 0, 0.6);
            --btn-gradient: linear-gradient(90deg, #9c27b0, #d81b60, #ff4081);
            --btn-hover-gradient: linear-gradient(90deg, #ab47bc, #ec407a, #ff80ab);
            --btn-shadow: rgba(156, 39, 176, 0.5);
            --btn-hover-shadow: rgba(156, 39, 176, 0.7);
        }

        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            background-size: 300% 300%;
            animation: gradientShift 18s ease infinite;
            font-family: system-ui, -apple-system, sans-serif;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 12vh;
            transition: background 0.5s ease;
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            padding: 3.5rem 3rem;
            background: var(--container-bg);
            border-radius: 24px;
            backdrop-filter: blur(14px);
            border: 1px solid var(--container-border);
            box-shadow: 0 14px 50px var(--shadow-color);
            margin-top: -8vh;
            max-width: 90%;
            transition: all 0.4s ease;
        }

        h1 {
            font-size: 5.5rem;
            font-weight: 900;
            letter-spacing: -3px;
            margin-bottom: 1.4rem;
            background: linear-gradient(90deg, #ffffff, #ffe066, #a5d8ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 6px 22px rgba(0, 0, 0, 0.4);
        }

        .intro {
            font-size: 1.8rem;
            margin: 1.2rem 0 2.5rem;
            opacity: 0.95;
            letter-spacing: 0.7px;
        }

        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background: var(--btn-gradient);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px var(--btn-shadow);
            margin-top: 1rem;
        }

        .btn:hover {
            transform: translateY(-4px) scale(1.08);
            box-shadow: 0 14px 40px var(--btn-hover-shadow);
            background: var(--btn-hover-gradient);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        /* Theme toggle button styling */
        #theme-toggle {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 1.6rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
        }

        #theme-toggle:hover {
            transform: scale(1.15);
            background: rgba(255,255,255,0.35);
        }

        body.dark #theme-toggle {
            background: rgba(30,10,50,0.4);
            border-color: rgba(200,150,255,0.3);
        }
    </style>
</head>
<body>

    <!-- Theme toggle button (sun/moon emoji changes automatically) -->
    <button id="theme-toggle" aria-label="Toggle dark mode">🌙</button>

    <div class="container">
        <h1>Hello World!</h1>
        <p class="intro">I'm Phoebe Lee 🌸<br>Welcome to my webpage</p>
        
        <a 
            href="https://www.youtube.com/watch?v=x6-2ER1IVzo" 
            target="_blank" 
            rel="noopener noreferrer"
            class="btn"
        >
            Play My Favorite Song 🎵
        </a>
    </div>

    <!-- Tiny JavaScript for theme switching -->
    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const body = document.body;

        // Check for saved preference or system preference
        if (localStorage.getItem('theme') === 'dark' || 
            (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            body.classList.add('dark');
            toggleBtn.textContent = '☀️';
        }

        toggleBtn.addEventListener('click', () => {
            body.classList.toggle('dark');
            
            // Update button icon
            if (body.classList.contains('dark')) {
                toggleBtn.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            } else {
                toggleBtn.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            }
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Hello World Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            
            /* Vibrant, energetic multi-color gradient */
            background: linear-gradient(135deg, 
                #ff6b6b 0%,    /* coral/red */
                #ff8e53 20%,   /* orange */
                #f9d423 40%,   /* bright yellow */
                #a8e063 60%,   /* lime green */
                #4facfe 80%,   /* cyan/blue */
                #9d4edd 100%   /* vibrant purple */
            );
            
            /* Optional subtle slow animation (remove if you prefer static) */
            background-size: 300% 300%;
            animation: gradientShift 18s ease infinite;
            
            font-family: system-ui, -apple-system, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: flex-start;   /* ← changed: align to top instead of center */
            padding-top: 15vh;          /* some breathing room from very top */
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            padding: 3rem 2.5rem;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            
            /* Push container higher up */
            margin-top: -10vh;         /* negative margin lifts it up */
            /* Alternative: transform: translateY(-15%); */
        }

        h1 {
            font-size: 5.8rem;         /* slightly bigger for impact */
            font-weight: 900;
            letter-spacing: -3px;
            margin-bottom: 1.2rem;
            background: linear-gradient(90deg, #ffffff, #ffe066, #ffffff, #a5d8ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
        }

        p {
            font-size: 1.6rem;
            opacity: 0.92;
            letter-spacing: 0.6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello World!</h1>
        <p>This is my first beautiful webpage </p>
    </div>
</body>
</html>
